name = "echo-reveng-defense"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
WORKER_VERSION = "1.0.0"

[[d1_databases]]
binding = "DB"
database_name = "echo-reveng-defense"
database_id = "b3765ded-cc9c-4b99-8797-bfa65f07d87f"

[[kv_namespaces]]
binding = "CACHE"
id = "ef041cffc28f4e7794816d01d858ddfa"

[[services]]
binding = "ECHO_CHAT"
service = "echo-chat"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[triggers]
crons = ["0 */12 * * *"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
